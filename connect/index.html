:root{--bg:#0a0a0a;--fg:#eae8e1;--fg2:#c3c1ba;--muted:#8f8d86;--line:rgba(220,218,211,.18);--line2:rgba(220,218,211,.34);--press:rgba(220,218,211,.06)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0}
body{background:var(--bg);color:var(--fg);font-family:Raleway,-apple-system,system-ui,sans-serif;min-height:100svh;
display:flex;flex-direction:column;align-items:center;padding:calc(24px + env(safe-area-inset-top)) 22px calc(24px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
.wrap{width:100%;max-width:374px;text-align:center;margin-block:auto}
.mk{display:block;height:42px;width:auto;margin:0 auto 2px;color:var(--fg)}
.avatar{display:block;width:142px;height:142px;border-radius:50%;object-fit:cover;object-position:center;margin:2px auto 0;border:1px solid var(--line2)}
h1{margin:14px 0 0;font-weight:600;font-variant-caps:small-caps;font-feature-settings:"smcp" 1;font-size:clamp(23px,6.4vw,27px);letter-spacing:.05em;color:var(--fg)}
.role{margin:7px 0 0;font-weight:600;font-variant-caps:small-caps;font-feature-settings:"smcp" 1;font-size:15px;letter-spacing:.13em;color:var(--fg2)}
.actions{margin-top:26px;display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 18px;border-radius:13px;cursor:pointer;
font:600 13px/1 Raleway,sans-serif;letter-spacing:.16em;text-transform:uppercase;border:1px solid transparent;
transition:transform .06s ease,background .15s ease,opacity .15s ease;text-decoration:none}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--fg);color:#0a0a0a}.btn-primary:active{opacity:.9}
.btn-outline{background:transparent;color:var(--fg);border-color:var(--line2)}.btn-outline:active{background:var(--press)}
.btn svg{width:18px;height:18px}
.btn-social svg{width:23px;height:23px}
.tiles{margin-top:10px;display:flex;justify-content:center;gap:9px}
.tile{display:flex;align-items:center;justify-content:center;width:56px;height:56px;border:1px solid var(--line);border-radius:13px;color:var(--fg2);text-decoration:none;transition:background .15s,transform .06s}
.tile:active{background:var(--press);transform:scale(.985)}.tile svg{width:24px;height:24px}
.duo{margin-top:10px;display:flex;gap:10px}.duo>*{flex:1;min-width:0}
:focus-visible{outline:2px solid var(--line2);outline-offset:3px;border-radius:12px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(14px);background:#151513;color:var(--fg);border:1px solid var(--line2);padding:10px 16px;border-radius:10px;font:600 11px/1 Raleway,sans-serif;letter-spacing:.14em;text-transform:uppercase;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sign{display:block;height:60px;width:auto;margin:24px auto 24px;color:var(--fg)}
.copyright{margin-top:0;color:#a8a69e;font-weight:500;font-size:11px;letter-spacing:.16em;font-variant-caps:small-caps}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head>

  function fold(p){let o="";for(let i=0;i<p.length;i+=74){o+=(i?"\r\n ":"")+p.substr(i,74);}return o;}
  const NAME="Jeff Grider, Ed.D.",TITLE="Chief Operating Officer",SITE="https://www.jeffgrider.com",PAGE="https://www.jeffgrider.com/connect";
  document.getElementById("linkedin").href=CONTACT.linkedin;
  document.getElementById("instagram").href=CONTACT.instagram;
  document.getElementById("t-msg").href="https://wa.me/"+CONTACT.phone.replace(/\D/g,"");
  document.getElementById("t-mail").href="mailto:"+CONTACT.email;
  document.getElementById("t-tel").href="tel:"+CONTACT.phone;
  function vcard(){return ["BEGIN:VCARD","VERSION:3.0","N:Grider;Jeff;;;Ed.D.","FN:"+NAME,"ORG:"+CONTACT.org,"TITLE:"+TITLE,"TEL;TYPE=CELL:"+CONTACT.phone,"EMAIL;TYPE=INTERNET:"+CONTACT.email,"URL:"+SITE,"X-SOCIALPROFILE;TYPE=linkedin:"+CONTACT.linkedin,"X-SOCIALPROFILE;TYPE=instagram:"+CONTACT.instagram,fold("PHOTO;ENCODING=b;TYPE=JPEG:"+PHOTO),"END:VCARD"].join("\r\n");}
  function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1900);}
  document.getElementById("save").addEventListener("click",()=>{const b=new Blob([vcard()],{type:"text/vcard;charset=utf-8"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="dr-jeff-grider.vcf";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);});
  document.getElementById("share").addEventListener("click",async()=>{const d={title:NAME,text:NAME,url:PAGE};try{if(navigator.share){await navigator.share(d);}else{await navigator.clipboard.writeText(PAGE);toast("Link copied");}}catch(e){}});
